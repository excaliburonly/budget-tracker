<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Minimalist Geometric Circle -->
  <circle cx="50" cy="50" r="42" stroke="#2563eb" stroke-width="2" />
  
  <!-- Interconnected Trajectory Lines -->
  <path 
    d="M 32 62 L 50 48 L 68 38" 
    stroke="#2563eb" 
    stroke-width="3" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Nodes (Dots) -->
  <circle cx="32" cy="62" r="4" fill="#2563eb" />
  <circle cx="50" cy="48" r="4" fill="#2563eb" />
  <circle cx="68" cy="38" r="4" fill="#2563eb" />
</svg>
